services:
  claude-fitbit:
    image: ghcr.io/aldarondo/claude-fitbit:latest
    restart: unless-stopped
    env_file: .env
    network_mode: host
    volumes:
      - ./tokens.json:/app/tokens.json
      - ./logs:/app/logs
    command: sh -c "node src/serve.js 2>&1 | tee -a /app/logs/app.log"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
